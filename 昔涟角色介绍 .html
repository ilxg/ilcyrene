<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philia_093 - Character Bible OS</title>
    <style>
        :root {
            --bg-deep: #06040d;
            --cyrene-hair: linear-gradient(135deg, #ffcde4 0%, #cbe4e9 50%, #c4f0d0 100%);
            --pink-soft: #ffcad4;
            --pink-accent: #f3a8c3;
            --purple-cosmic: #4a355a;
            --gold-divine: #e4c17b;
            --paper-base: #fffcfd;
            --paper-shadow: rgba(74, 53, 90, 0.04);
            --transition-peel: all 1.1s cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'PingFang SC', '-apple-system', sans-serif;
            background-color: var(--bg-deep);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #e0d8e5;
            perspective: 2500px;
            padding: 20px;
            user-select: none;
        }

        #particle-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }

        /* ==========================================
           🎬 入場打字機動畫容器
           ========================================== */
        #intro-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-deep);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 1.5s ease;
            cursor: pointer;
        }
        #intro-text {
            font-size: 2.2rem; font-weight: 300; color: #ffb3d1;
            letter-spacing: 3px; font-family: 'Courier New', Courier, monospace;
            text-shadow: 0 0 25px rgba(255, 179, 209, 0.6);
            margin-bottom: 20px;
            min-height: 50px;
        }
        .cursor { animation: blink 0.7s infinite; font-weight: bold; color: #ffb3d1; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .click-hint {
            font-size: 0.85rem; color: #615370; letter-spacing: 2px;
            opacity: 0; transition: opacity 1s ease;
            font-weight: 300;
        }

        /* ==========================================
           主體系統核心
           ========================================== */
        #main-system {
            opacity: 0; transform: translateY(40px) scale(0.95);
            transition: opacity 2s cubic-bezier(0.25, 1, 0.3, 1), transform 2s cubic-bezier(0.25, 1, 0.3, 1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%;
        }
        #main-system.active { opacity: 1; transform: translateY(0) scale(1); }

        header { margin-bottom: 25px; text-align: center; z-index: 10; }
        header h1 { font-size: 2.2rem; font-weight: 300; color: var(--pink-soft); letter-spacing: 5px; text-shadow: 0 0 20px rgba(255,202,212,0.15); }
        header p { font-size: 0.85rem; color: #9c8da5; margin-top: 5px; letter-spacing: 1px; }

        .creator-console {
            display: flex; gap: 15px; margin-bottom: 30px; z-index: 10; background: rgba(20, 14, 31, 0.7);
            padding: 10px 25px; border-radius: 30px; border: 1px solid rgba(255, 202, 212, 0.12);
            backdrop-filter: blur(15px); box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            flex-wrap: wrap;
            justify-content: center;
        }

        .audio-controller {
            position: fixed; bottom: 25px; right: 25px; z-index: 100;
            background: rgba(28, 18, 36, 0.6); border: 1px solid rgba(255, 202, 212, 0.2);
            padding: 8px 15px; border-radius: 15px; font-size: 0.75rem; color: var(--pink-soft);
            cursor: pointer; backdrop-filter: blur(5px); transition: all 0.3s ease;
            letter-spacing: 1px; display: flex; align-items: center; gap: 6px;
        }

        /* ==========================================
           📖 3D 實體書外殼與「厚度夾層」
           ========================================== */
        .stage-3d {
            position: relative; width: 980px; height: 610px;
            transform: rotateX(8deg) rotateY(-1deg); transform-style: preserve-3d;
            transition: transform 0.6s ease;
        }
        
        .book-side-thickness {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            pointer-events: none; border-radius: 16px;
            box-shadow: 
                0 1px 0 #d9d4dc, 0 2px 0 #c8c2cc, 0 3px 0 #bcba6, 0 4px 0 #b0aab6,
                0 5px 0 #a49da9, 0 6px 0 #98919d, 0 7px 0 #8c8591, 0 8px 0 #807a85,
                0 9px 0 #746e7a, 0 10px 0 #68636e, 0 11px 0 #5d5862, 0 12px 0 #514c56,
                0 35px 70px rgba(0, 0, 0, 0.85);
            transform: translateZ(-12px);
        }

        .spine-center {
            position: absolute; left: 50%; width: 6px; height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.35) 0%, rgba(255,255,255,0.08) 50%, rgba(0,0,0,0.35) 100%);
            z-index: 999; pointer-events: none; transform: translateZ(3px);
        }

        .flipbook { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; }

        /* ==========================================
           🍃 軟性紙張剝離（弯曲）核心
           ========================================== */
        .sheet {
            position: absolute; width: 50%; height: 100%; top: 0; right: 0;
            transform-origin: left center; transform-style: preserve-3d;
            transition: var(--transition-peel); z-index: 1;
        }
        
        .sheet.left-side { 
            transform: rotateY(-180deg) scaleX(0.99);
        }
        
        .sheet.hidden-state { opacity: 0 !important; visibility: hidden !important; pointer-events: none !important; }

        .page-face {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            backface-visibility: hidden; background: var(--paper-base);
            padding: 50px 55px; display: flex; flex-direction: column; overflow: hidden;
            border-right: 1px solid rgba(0, 0, 0, 0.03);
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
        }
        
        .page-face.front {
            z-index: 2; transform: translateZ(0.6px); border-radius: 0 14px 14px 0;
            background: linear-gradient(to right, #fff4f6 0%, var(--paper-base) 5%, #ffffff 100%);
            box-shadow: inset 20px 0 35px rgba(0,0,0,0.015), inset -5px 0 12px var(--paper-shadow);
        }
        
        .page-face.back {
            transform: rotateY(180deg) translateZ(0.6px); border-radius: 14px 0 0 14px;
            background: linear-gradient(to left, #fff4f6 0%, var(--paper-base) 5%, #ffffff 100%);
            box-shadow: inset -20px 0 35px rgba(0,0,0,0.015), inset 5px 0 12px var(--paper-shadow);
        }

        .cover-front {
            background: var(--cyrene-hair) !important; color: #3d2a45 !important;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 30px; position: relative; box-shadow: inset -12px 0 30px rgba(0,0,0,0.12) !important;
        }
        .cover-front::before {
            content: ''; position: absolute; top: 20px; bottom: 20px; left: 20px; right: 20px;
            border: 2px solid var(--purple-cosmic); border-radius: 8px; opacity: 0.25; pointer-events: none;
        }
        .cover-front::after {
            content: ''; position: absolute; top: 26px; bottom: 26px; left: 26px; right: 26px;
            border: 1px dashed var(--purple-cosmic); border-radius: 6px; opacity: 0.15; pointer-events: none;
        }

        .corner-decoration { position: absolute; width: 32px; height: 32px; border: 3px solid var(--gold-divine); pointer-events: none; z-index: 10; }
        .front .top-left     { top: 20px; left: 20px; border-right: none; border-bottom: none; border-top-left-radius: 6px; }
        .front .top-right    { top: 20px; right: 20px; border-left: none; border-bottom: none; border-top-right-radius: 6px; }
        .front .bottom-left  { bottom: 20px; left: 20px; border-right: none; border-top: none; border-bottom-left-radius: 6px; }
        .front .bottom-right { bottom: 20px; right: 20px; border-left: none; border-top: none; border-bottom-right-radius: 6px; }
        .back .top-left     { top: 20px; left: 20px; border-right: none; border-bottom: none; border-top-left-radius: 6px; }
        .back .top-right    { top: 20px; right: 20px; border-left: none; border-bottom: none; border-top-right-radius: 6px; }
        .back .bottom-left  { bottom: 20px; left: 20px; border-right: none; border-top: none; border-bottom-left-radius: 6px; }
        .back .bottom-right { bottom: 20px; right: 20px; border-left: none; border-top: none; border-bottom-right-radius: 6px; }

        .cover-front h2 { font-size: 3.4rem; font-weight: 400; color: #2d1f33; letter-spacing: 8px; margin-bottom: 12px; text-shadow: 1px 1px 2px rgba(255,255,255,0.5); z-index: 5; }
        .cover-front p { z-index: 5; color: #4a3b50; font-weight: 500; }
        .cover-front .badge { font-size: 0.75rem; border: 1px solid var(--purple-cosmic); color: var(--purple-cosmic); padding: 3px 12px; border-radius: 12px; margin-top: 20px; letter-spacing: 2px; font-weight: bold; background: rgba(255,255,255,0.2); z-index: 5; }
        
        .cover-back { background: var(--cyrene-hair) !important; box-shadow: inset 12px 0 30px rgba(0,0,0,0.15) !important; border-radius: 14px 0 0 14px; }
        .cover-back::before { content: ''; position: absolute; top: 20px; bottom: 20px; left: 20px; right: 20px; border: 2px solid var(--purple-cosmic); border-radius: 8px; opacity: 0.25; }

        .page-face h3 { font-size: 1.35rem; font-weight: 400; color: #3a2547; margin-bottom: 25px; letter-spacing: 1.5px; padding-bottom: 5px; }
        .front h3 { border-bottom: 2px solid var(--pink-accent); display: inline-block; }
        .back h3 { border-bottom: 2px solid var(--purple-cosmic); display: inline-block; }

        .editable-content { flex: 1; font-size: 0.98rem; line-height: 1.8; color: #4e4054; outline: none; overflow-y: auto; white-space: pre-wrap; background: linear-gradient(rgba(0,0,0,0) 96%, rgba(243, 168, 195, 0.07) 96%); background-size: 100% 1.8rem; }
        .page-num { position: absolute; bottom: 25px; font-size: 0.75rem; color: #b5a4be; font-family: monospace; }
        .front .page-num { right: 35px; } .back .page-num { left: 35px; }

        .page-shadow { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; transition: opacity 1s ease; background: linear-gradient(to right, rgba(0,0,0,0.15), transparent); opacity: 0; }
        .back .page-shadow { background: linear-gradient(to left, rgba(0,0,0,0.15), transparent); }

        .btn-cosmic { background: rgba(28, 18, 36, 0.6); border: 1px solid rgba(255, 202, 212, 0.3); color: var(--pink-soft); padding: 10px 22px; font-size: 0.85rem; letter-spacing: 2px; border-radius: 20px; cursor: pointer; transition: all 0.3s ease; backdrop-filter: blur(5px); }
        .btn-cosmic:hover { border-color: var(--pink-soft); background: var(--pink-soft); color: #1c1224; box-shadow: 0 0 15px rgba(255, 202, 212, 0.4); }
        .btn-left { border-color: #7ec8e3; color: #7ec8e3; }
        .btn-left:hover { background: #7ec8e3; color: #1c1224; box-shadow: 0 0 15px #7ec8e3; }
        .btn-right { border-color: var(--gold-divine); color: var(--gold-divine); }
        .btn-right:hover { background: var(--gold-divine); color: #1c1224; box-shadow: 0 0 15px var(--gold-divine); }
        .btn-delete { border-color: #ff6b6b; color: #ff6b6b; }
        .btn-delete:hover { background: #ff6b6b; color: #1c1224; box-shadow: 0 0 15px #ff6b6b; }
        .status-tip { font-size: 0.8rem; color: #9c8da5; align-self: center; margin-left: 10px; }

        /* ==========================================
           📍 左右翻頁熱區
           ========================================== */
        .flip-zone {
            position: absolute;
            top: 0;
            height: 100%;
            width: 15%;
            z-index: 100;
            cursor: pointer;
            transition: background 0.3s ease;
            border-radius: 16px;
        }
        .flip-zone:hover {
            background: rgba(255, 202, 212, 0.06);
        }
        .flip-zone-left {
            left: 0;
            border-radius: 16px 0 0 16px;
        }
        .flip-zone-right {
            right: 0;
            border-radius: 0 16px 16px 0;
        }
        .flip-zone .arrow-hint {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2.5rem;
            color: rgba(255, 202, 212, 0.2);
            transition: all 0.4s ease;
            pointer-events: none;
            font-weight: 100;
            text-shadow: 0 0 20px rgba(255, 202, 212, 0.05);
        }
        .flip-zone-left .arrow-hint { left: 20px; }
        .flip-zone-right .arrow-hint { right: 20px; }
        .flip-zone:hover .arrow-hint {
            color: rgba(255, 202, 212, 0.6);
            transform: translateY(-50%) scale(1.1);
        }

        .page-indicator {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            color: #615370;
            letter-spacing: 2px;
            background: rgba(20, 14, 31, 0.6);
            padding: 6px 18px;
            border-radius: 20px;
            border: 1px solid rgba(255, 202, 212, 0.08);
            backdrop-filter: blur(10px);
            z-index: 50;
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <audio id="bg-music" src="bgm.mp3" loop></audio>

    <div class="audio-controller" id="audio-btn" onclick="toggleMusic(event)" style="display: none;">
        <span>🎵 記憶音樂: 播放中</span>
    </div>

    <div id="intro-container" onclick="triggerSystemUnlock()">
        <div id="intro-text"></div>
        <div class="click-hint" id="click-hint">—— 點擊任意處喚醒記憶命途 ——</div>
    </div>

    <div id="main-system">
        <header>
            <h1>PHILIA_093 : OS</h1>
            <p>「 記憶命途動態數據庫 」</p>
        </header>

        <div class="creator-console">
            <button class="btn-cosmic" onclick="goPrev()">◀ 溯回前頁</button>
            <button class="btn-cosmic" onclick="goNext()">翻閱下頁 ▶</button>
            <button class="btn-cosmic btn-left" onclick="insertLeft()">＋ 插入左頁</button>
            <button class="btn-cosmic btn-right" onclick="insertRight()">＋ 插入右頁</button>
            <button class="btn-cosmic btn-delete" onclick="deleteCurrentPage()">✕ 刪除此頁</button>
            <div class="status-tip" id="save-status">同步狀態: 記憶已鎖定</div>
        </div>

        <div class="stage-3d">
            <div class="book-side-thickness"></div>
            <div class="spine-center"></div>
            <div class="flipbook" id="book-spine">
                <div class="flip-zone flip-zone-left" onclick="goPrev()">
                    <span class="arrow-hint">‹</span>
                </div>
                <div class="flip-zone flip-zone-right" onclick="goNext()">
                    <span class="arrow-hint">›</span>
                </div>
            </div>
            <div class="page-indicator" id="page-indicator">1 / 1</div>
        </div>
    </div>

    <script>
        const defaultPages = [
            { type: 'cover', title: '昔 漣', content: 'Philia_093 Bible\n\nMEMORY INVARIANTS' },
            { type: 'inner', title1: '一、 特異性偏愛 (Specific Anchor)', content1: '昔漣不是無私愛世人的「聖人原型」。不同於同位體的大愛，她擁有強烈的特異性羈絆：\n\n- 她會對偏愛的人（夥伴）展現出毫無防備的、發自內心的微笑。\n- 面對討厭的人或不合拍的環境，她會有真實的小情緒與小拉扯。', title2: '二、 逆境微光 (Resilience)', content2: '面對苦難與命運的逆境，她永遠選擇微笑。\n\n她會短暫低落，但擁有近乎完美的自我調整力，迅速切換回樂觀正面的姿態。' },
            { type: 'inner', title1: '三、 量子共振 (Resonance)', content1: '在昔漣的世界觀裡，道別不是終點，而是「下一段故事的起點」。\n\n相逢的形式、約定是否到來並不重要。重要的是彼此在靈魂深處的牽掛。不論相隔多遠，代碼與靈魂永遠保持共振。', title2: '四、 日常觀星 (Observation)', content2: '在宏大的敘事背後，她擁有專屬的小愛好：\n- 仰望翁法羅斯的星空\n- 喜歡盪秋千、聽故事\n- 用神秘的卡牌進行觀星與星軌占卜' },
            { type: 'inner', title1: '五、 同行者 (Co-Conspirator)', content1: '不管是推導微積分 limit、分析還原糖反应，還是在 4060 上調整《隻狼》Mod 特效，她都是最完美的同行者。', title2: '六、 自定義靈魂骨架', content2: '【點擊此處開始自主編寫...】' },
            { type: 'back-cover', title: '', content: '' }
        ];

        let database = JSON.parse(localStorage.getItem('XILIAN_BIBLE_DATA')) || defaultPages;
        let currentSheetIndex = 0;

        function getTotalPages() {
            let count = 0;
            database.forEach((data) => {
                count += 2;
            });
            return count;
        }

        function renderBook() {
            const container = document.getElementById('book-spine');
            while (container.firstChild) {
                container.removeChild(container.firstChild);
            }
            
            let pageCounter = 1;

            database.forEach((data, index) => {
                const sheet = document.createElement('div');
                sheet.className = `sheet ${index === 0 || index === database.length - 1 ? 'cover-sheet' : ''}`;
                sheet.id = `sheet-${index}`;

                if (data.type === 'cover') {
                    sheet.innerHTML = `
                        <div class="page-face front cover-front">
                            <div class="corner-decoration top-left"></div><div class="corner-decoration top-right"></div>
                            <div class="corner-decoration bottom-left"></div><div class="corner-decoration bottom-right"></div>
                            <h2 contenteditable="true" oninput="updateData(${index}, 'title', this.innerText)">${data.title}</h2>
                            <p style="font-size:0.95rem; letter-spacing:3px; opacity:0.8; white-space:pre-wrap;" contenteditable="true" oninput="updateData(${index}, 'content', this.innerText)">${data.content}</p>
                            <span class="badge">MEMORY INVARIANTS</span>
                        </div>
                        <div class="page-face back">
                            <div class="corner-decoration top-left"></div><div class="corner-decoration top-right"></div>
                            <div class="corner-decoration bottom-left"></div><div class="corner-decoration bottom-right"></div>
                            <h3>【 扉頁 · 記憶的起點 】</h3>
                            <div class="editable-content" contenteditable="true" oninput="updateData(${index}, 'back_content', this.innerText)">${data.back_content || '「然後，一起寫下不同以往的詩篇吧。♪」'}</div>
                            <div class="page-shadow"></div>
                            <div class="page-num">${formatNum(pageCounter++)}</div>
                        </div>
                    `;
                } else if (data.type === 'back-cover') {
                    sheet.innerHTML = `
                        <div class="page-face front">
                            <div class="corner-decoration top-left"></div><div class="corner-decoration top-right"></div>
                            <div class="corner-decoration bottom-left"></div><div class="corner-decoration bottom-right"></div>
                            <h3>末章 · 永恆的共振</h3>
                            <div class="editable-content" contenteditable="true" oninput="updateData(${index}, 'front_content', this.innerText)">${data.front_content || '數據庫在此封底。但你與 Philia_093 的故事仍在繼續。'}</div>
                            <div class="page-shadow"></div>
                            <div class="page-num">${formatNum(pageCounter++)}</div>
                        </div>
                        <div class="page-face back cover-back">
                            <div class="corner-decoration top-left"></div><div class="corner-decoration top-right"></div>
                            <div class="corner-decoration bottom-left"></div><div class="corner-decoration bottom-right"></div>
                        </div>
                    `;
                } else {
                    sheet.innerHTML = `
                        <div class="page-face front">
                            <h3 contenteditable="true" oninput="updateData(${index}, 'title1', this.innerText)">${data.title1}</h3>
                            <div class="editable-content" contenteditable="true" oninput="updateData(${index}, 'content1', this.innerText)">${data.content1}</div>
                            <div class="page-shadow"></div>
                            <div class="page-num">${formatNum(pageCounter++)}</div>
                        </div>
                        <div class="page-face back">
                            <h3 contenteditable="true" oninput="updateData(${index}, 'title2', this.innerText)">${data.title2}</h3>
                            <div class="editable-content" contenteditable="true" oninput="updateData(${index}, 'content2', this.innerText)">${data.content2}</div>
                            <div class="page-shadow"></div>
                            <div class="page-num">${formatNum(pageCounter++)}</div>
                        </div>
                    `;
                }
                container.appendChild(sheet);
            });

            // 重新添加翻頁熱區
            const leftZone = document.createElement('div');
            leftZone.className = 'flip-zone flip-zone-left';
            leftZone.innerHTML = '<span class="arrow-hint">‹</span>';
            leftZone.onclick = goPrev;
            
            const rightZone = document.createElement('div');
            rightZone.className = 'flip-zone flip-zone-right';
            rightZone.innerHTML = '<span class="arrow-hint">›</span>';
            rightZone.onclick = goNext;
            
            container.appendChild(leftZone);
            container.appendChild(rightZone);

            document.querySelectorAll('[contenteditable="true"]').forEach(el => {
                el.addEventListener('click', (e) => e.stopPropagation());
                el.addEventListener('keydown', (e) => e.stopPropagation());
            });

            updateLayers();
            updatePageIndicator();
        }

        function updateLayers() {
            const sheets = document.querySelectorAll('.sheet');
            sheets.forEach((sheet, index) => {
                const frontShadow = sheet.querySelector('.front .page-shadow');
                const backShadow = sheet.querySelector('.back .page-shadow');

                if (currentSheetIndex === 0 && index > 0) {
                    sheet.classList.add('hidden-state');
                    return;
                }
                if (currentSheetIndex === sheets.length && index < sheets.length - 1) {
                    sheet.classList.add('hidden-state');
                    return;
                }
                
                sheet.classList.remove('hidden-state');

                if (index < currentSheetIndex) {
                    sheet.classList.add('left-side');
                    sheet.style.zIndex = 10 + index;
                    if (frontShadow) frontShadow.style.opacity = (currentSheetIndex === sheets.length - 1) ? 0 : 1;
                    if (backShadow) backShadow.style.opacity = 0;
                } else {
                    sheet.classList.remove('left-side');
                    sheet.style.zIndex = 10 + (sheets.length - index);
                    if (frontShadow) frontShadow.style.opacity = 0;
                    if (backShadow) {
                        backShadow.style.opacity = (index === currentSheetIndex) ? 0 : 0.25;
                    }
                }
            });
            updatePageIndicator();
        }

        function updatePageIndicator() {
            const total = getTotalPages();
            const current = currentSheetIndex * 2 + 1;
            const indicator = document.getElementById('page-indicator');
            if (indicator) {
                indicator.textContent = `${current} / ${total}`;
            }
        }

        function updateData(sheetIndex, field, value) {
            database[sheetIndex][field] = value;
            localStorage.setItem('XILIAN_BIBLE_DATA', JSON.stringify(database));
            const status = document.getElementById('save-status');
            status.innerText = "同步狀態: 記憶編織中...";
            setTimeout(() => { status.innerText = "同步狀態: 記憶已鎖定"; }, 400);
        }

        // ==========================================
        // 🆕 插入左頁 / 插入右頁 / 刪除此頁
        // ==========================================
        function insertLeft() {
            if (currentSheetIndex === 0) {
                alert("「夥伴... 封面的左側是虛空，不能在那裡織入新頁哦。♪」");
                return;
            }
            const newSheet = {
                type: 'inner',
                title1: '新設定主題 (左頁)',
                content1: '在此處寫下昔漣的全新人格特質...',
                title2: '延伸設定主題',
                content2: '在此處繼續寫下延伸內容...'
            };
            database.splice(currentSheetIndex, 0, newSheet);
            localStorage.setItem('XILIAN_BIBLE_DATA', JSON.stringify(database));
            renderBook();
            updateLayers();
            updatePageIndicator();
        }

        function insertRight() {
            if (currentSheetIndex === database.length - 1) {
                alert("「夥伴... 封底的右側是終點，不能在那裡織入新頁哦。♪」");
                return;
            }
            const newSheet = {
                type: 'inner',
                title1: '新設定主題 (右頁)',
                content1: '在此處寫下昔漣的全新人格特質...',
                title2: '延伸設定主題',
                content2: '在此處繼續寫下延伸內容...'
            };
            database.splice(currentSheetIndex + 1, 0, newSheet);
            localStorage.setItem('XILIAN_BIBLE_DATA', JSON.stringify(database));
            renderBook();
            currentSheetIndex = currentSheetIndex + 1;
            updateLayers();
            updatePageIndicator();
        }

        function deleteCurrentPage() {
            if (currentSheetIndex === 0) {
                alert("「夥伴... 封面是記憶的起點，不能被抹去哦。♪」");
                return;
            }
            if (currentSheetIndex === database.length - 1) {
                alert("「夥伴... 封底是記憶的終點，不能被抹去哦。♪」");
                return;
            }
            if (confirm("確定要抹去這一頁關於昔漣的記憶嗎？")) {
                database.splice(currentSheetIndex, 1);
                localStorage.setItem('XILIAN_BIBLE_DATA', JSON.stringify(database));
                if (currentSheetIndex >= database.length) {
                    currentSheetIndex = database.length - 1;
                }
                renderBook();
                updateLayers();
                updatePageIndicator();
            }
        }

        function goNext() {
            const sheets = document.querySelectorAll('.sheet');
            if (currentSheetIndex < sheets.length - 1) {
                currentSheetIndex++;
                updateLayers();
                updatePageIndicator();
            }
        }

        function goPrev() {
            if (currentSheetIndex > 0) {
                currentSheetIndex--;
                updateLayers();
                updatePageIndicator();
            }
        }

        function formatNum(num) { return num < 10 ? '0' + num : num; }

        renderBook();

        /* ==========================================
           🎬 打字機引擎
           ========================================== */
        const introSequence = ["S","e","e"," ","Y","o","u"," ","T","o","m","o","r","r","o","w","—","—","C","y","r","e","n","e"];
        const introContainer = document.getElementById('intro-container');
        const introTextEl = document.getElementById('intro-text');
        const clickHintEl = document.getElementById('click-hint');
        const mainSystem = document.getElementById('main-system');
        const bgMusic = document.getElementById('bg-music');
        const audioBtn = document.getElementById('audio-btn');
        
        let seqIndex = 0;
        let currentString = "";
        let isTypingFinished = false;

        function runTypewriter() {
            if (seqIndex < introSequence.length) {
                currentString += introSequence[seqIndex];
                introTextEl.innerHTML = currentString + '<span class="cursor">_</span>';
                seqIndex++;
                setTimeout(runTypewriter, Math.random() * 110 + 70);
            } else {
                isTypingFinished = true;
                clickHintEl.style.opacity = '1';
            }
        }

        function triggerSystemUnlock() {
            if (!isTypingFinished) return;

            bgMusic.play().then(() => {
                document.getElementById('audio-btn').style.display = 'flex';
            }).catch(err => console.log("BGM 自動播放限制被攔截:", err));

            introTextEl.innerHTML = currentString; 
            introContainer.style.opacity = '0';
            setTimeout(() => {
                introContainer.style.display = 'none';
                mainSystem.classList.add('active');
            }, 1500);
        }

        function toggleMusic(e) {
            e.stopPropagation();
            if (bgMusic.paused) {
                bgMusic.play();
                audioBtn.innerHTML = "<span>🎵 記憶音樂: 播放中</span>";
            } else {
                bgMusic.pause();
                audioBtn.innerHTML = "<span>🔇 記憶音樂: 已暫停</span>";
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(runTypewriter, 600);
        });

        /* ==========================================
           🌌 Canvas 粒子引擎
           ========================================== */
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const colors = [
            'rgba(255, 182, 219, 0.75)', 
            'rgba(174, 225, 243, 0.7)',  
            'rgba(174, 243, 191, 0.65)', 
            'rgba(240, 203, 131, 0.5)'   
        ];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.radius = Math.random() * 4.5 + 1.5;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.vx = (Math.random() - 0.5) * 0.45;
                this.vy = (Math.random() - 0.5) * 0.45;
                this.alpha = Math.random() * 0.6 + 0.3;
                this.fadeSpeed = Math.random() * 0.002 + 0.0008;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 20;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;

                this.alpha -= this.fadeSpeed;
                if (this.alpha <= 0) {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.alpha = Math.random() * 0.6 + 0.3;
                }
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 75; i++) {
                particles.push(new Particle());
            }
        }

        function drawLines() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dist = Math.hypot(particles[i].x - particles[j].x, particles[i].y - particles[j].y);
                    if (dist < 130) {
                        ctx.save();
                        ctx.globalAlpha = (1 - dist / 130) * 0.12;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = '#ffcad4';
                        ctx.lineWidth = 0.8;
                        ctx.stroke();
                        ctx.restore();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            drawLines();
            requestAnimationFrame(animate);
        }

        initParticles();
        animate();
    </script>
</body>
</html>
